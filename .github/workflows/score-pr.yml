name: Score merged pull requests

on:
  pull_request_target:
    types: [closed]
    paths:
      - 'content/posts/*/*.md'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to process manually'
        required: false
      post_slugs:
        description: 'Comma-separated post slugs (preferred for manual scoring)'
        required: false
      post_slug:
        description: 'Single post slug (legacy manual input)'
        required: false
      new_post_slugs:
        description: 'Comma-separated slugs that were newly added posts'
        required: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  score:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name != 'workflow_dispatch' && github.event.pull_request.base.ref || github.ref_name }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Resolve post slugs from eligible PR file changes
        if: github.event_name != 'workflow_dispatch'
        id: resolve_post_slug
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const pullNumber = context.payload.pull_request?.number;
            if (!pullNumber) return '';

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pullNumber,
              per_page: 100
            });

            const allowedPath = /^content\/posts\/[^/]+\/[^/]+\.md$/;
            const allowedStatuses = new Set(['added', 'modified', 'removed']);
            const eligibleFiles = files.filter((file) =>
              allowedPath.test(file.filename) && allowedStatuses.has(file.status)
            );

            core.setOutput('has_eligible_changes', eligibleFiles.length > 0 ? 'true' : 'false');

            if (eligibleFiles.length === 0) {
              core.info('No eligible post-file changes found. Scoring steps will be skipped.');
              return '';
            }

            const allSlugs = eligibleFiles
              .map((file) => file.filename.replace(/^content\/posts\//, '').replace(/\.md$/, ''));
            const newPostSlugs = eligibleFiles
              .filter((file) => file.status === 'added')
              .map((file) => file.filename.replace(/^content\/posts\//, '').replace(/\.md$/, ''));

            core.setOutput('post_slugs', allSlugs.join(','));
            core.setOutput('new_post_slugs', newPostSlugs.join(','));

            return allSlugs[0];

      - name: Create score event from PR labels
        if: github.event_name == 'workflow_dispatch' || steps.resolve_post_slug.outputs.has_eligible_changes == 'true'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          PR_USERNAME: ${{ github.event.pull_request.user.login }}
          PR_USER_AVATAR_URL: ${{ github.event.pull_request.user.avatar_url }}
          PR_MERGED_AT: ${{ github.event.pull_request.merged_at }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          PR_POST_SLUGS: ${{ github.event_name != 'workflow_dispatch' && steps.resolve_post_slug.outputs.post_slugs || github.event.inputs.post_slugs || github.event.inputs.post_slug || '' }}
          PR_NEW_POST_SLUGS: ${{ github.event_name != 'workflow_dispatch' && steps.resolve_post_slug.outputs.new_post_slugs || github.event.inputs.new_post_slugs || '' }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch: set all PR_* values (especially PR_POST_SLUGS and optional PR_NEW_POST_SLUGS) via inputs/env."
          fi
          npm run openblog:add-event

      - name: Regenerate leaderboard and users
        if: github.event_name == 'workflow_dispatch' || steps.resolve_post_slug.outputs.has_eligible_changes == 'true'
        run: npm run openblog:generate

      - name: Detect generated openblog-data changes
        if: github.event_name == 'workflow_dispatch' || steps.resolve_post_slug.outputs.has_eligible_changes == 'true'
        id: openblog_changes
        run: |
          if git diff --quiet -- openblog/events openblog/generated; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No generated openblog-data changes detected."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Generated openblog-data changes detected."
          fi

      - name: Commit generated openblog data
        if: steps.openblog_changes.outputs.has_changes == 'true'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          branch: ${{ github.event_name != 'workflow_dispatch' && github.event.pull_request.base.ref || github.ref_name }}
          commit_message: "chore(openblog): update events and leaderboard from merged PR"
          file_pattern: openblog/events/*.json openblog/generated/*.json openblog/generated/**/*.json

      - name: Comment contributed post links on PR
        if: github.event_name != 'workflow_dispatch' && steps.resolve_post_slug.outputs.has_eligible_changes == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.OPENBLOG_BOT_TOKEN != '' && secrets.OPENBLOG_BOT_TOKEN || github.token }}
          script: |
            const prNumber = context.payload.pull_request?.number;
            if (!prNumber) {
              core.info('No PR number found. Skipping contribution comment.');
              return;
            }
            const contributor = context.payload.pull_request?.user?.login;
            const greeting = contributor ? `Hi @${contributor}` : 'Hi there';

            const marker = '<!-- openblog-contribution-summary -->';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const websiteBaseUrl = (process.env.WEBSITE_BASE_URL || 'https://openblog.cc').trim().replace(/\/+$/, '');
            const postSlugs = (process.env.POST_SLUGS || '')
              .split(',')
              .map((value) => value.trim())
              .filter(Boolean);

            if (postSlugs.length === 0) {
              core.info('No post slugs found. Skipping contribution comment.');
              return;
            }

            const postLines = postSlugs.map((slug) => {
              const encodedPath = slug.split('/').map((segment) => encodeURIComponent(segment)).join('/');
              const postUrl = `${websiteBaseUrl}/posts/${encodedPath}/`;
              return `- \`${slug}\`: ${postUrl}`;
            });

            const body = [
              marker,
              `${greeting}, thank you for your contribution to OpenBlog.`,
              'Your contribution has been recorded and scoring has been updated.',
              '',
              '**Contributed post(s):**',
              ...postLines
            ].join('\n');

            // Delay comment publishing to allow downstream systems to settle.
            await new Promise((resolve) => setTimeout(resolve, 10_000));

            try {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: prNumber,
                per_page: 100
              });

              const existing = comments.find((comment) => comment.body?.includes(marker));

              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body
                });
                core.info(`Updated existing contribution comment (${existing.id}).`);
                return;
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body
              });
              core.info('Created contribution summary comment.');
            } catch (error) {
              if (error?.status === 403) {
                core.warning('Skipping PR comment because token cannot write issue comments in this context.');
                return;
              }
              throw error;
            }
        env:
          POST_SLUGS: ${{ steps.resolve_post_slug.outputs.post_slugs }}
          WEBSITE_BASE_URL: ${{ vars.OPENBLOG_BASE_URL || secrets.OPENBLOG_BASE_URL || vars.SITE_URL || secrets.SITE_URL || 'https://openblog.cc' }}

name: Score merged pull requests

on:
  pull_request:
    types: [closed]
    paths:
      - 'content/posts/*/*.md'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to process manually'
        required: false
      post_slug:
        description: 'Post slug (required for manual scoring if no PR payload exists)'
        required: false

permissions:
  contents: write
  pull-requests: read

jobs:
  score:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || github.ref_name }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Resolve post slug from eligible PR file changes
        if: github.event_name == 'pull_request'
        id: resolve_post_slug
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const pullNumber = context.payload.pull_request?.number;
            if (!pullNumber) return '';

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pullNumber,
              per_page: 100
            });

            const allowedPath = /^content\/posts\/[^/]+\/[^/]+\.md$/;
            const allowedStatuses = new Set(['added', 'modified', 'removed']);
            const eligibleFiles = files.filter((file) =>
              allowedPath.test(file.filename) && allowedStatuses.has(file.status)
            );

            core.setOutput('has_eligible_changes', eligibleFiles.length > 0 ? 'true' : 'false');

            if (eligibleFiles.length === 0) {
              core.info('No eligible post-file changes found. Scoring steps will be skipped.');
              return '';
            }

            const postFile = eligibleFiles[0].filename;
            return postFile.replace(/^content\/posts\//, '').replace(/\.md$/, '');

      - name: Create score event from PR labels
        if: github.event_name == 'workflow_dispatch' || steps.resolve_post_slug.outputs.has_eligible_changes == 'true'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          PR_USERNAME: ${{ github.event.pull_request.user.login }}
          PR_USER_AVATAR_URL: ${{ github.event.pull_request.user.avatar_url }}
          PR_MERGED_AT: ${{ github.event.pull_request.merged_at }}
          PR_LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
          PR_POST_SLUG: ${{ github.event_name == 'pull_request' && steps.resolve_post_slug.outputs.result || github.event.inputs.post_slug || '' }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch: set all PR_* values (especially PR_POST_SLUG) via inputs/env."
          fi
          npm run game:add-event

      - name: Regenerate leaderboard and users
        if: github.event_name == 'workflow_dispatch' || steps.resolve_post_slug.outputs.has_eligible_changes == 'true'
        run: npm run game:generate

      - name: Detect generated game-data changes
        if: github.event_name == 'workflow_dispatch' || steps.resolve_post_slug.outputs.has_eligible_changes == 'true'
        id: game_changes
        run: |
          if git diff --quiet -- game/events game/generated; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No generated game-data changes detected."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Generated game-data changes detected."
          fi

      - name: Commit generated game data
        if: steps.game_changes.outputs.has_changes == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || github.ref_name }}
          commit_message: "chore(game): update events and leaderboard from merged PR"
          file_pattern: game/events/*.json game/generated/*.json game/generated/**/*.json
